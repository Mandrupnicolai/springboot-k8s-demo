apiVersion: v1
kind: Service
metadata:
  name: {{ include "springboot-k8s-demo.fullname" . }}-svc
  labels:
    {{- include "springboot-k8s-demo.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "springboot-k8s-demo.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
