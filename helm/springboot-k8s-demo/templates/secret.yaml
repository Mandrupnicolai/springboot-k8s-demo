apiVersion: v1
kind: Secret
metadata:
  name: {{ include "springboot-k8s-demo.fullname" . }}-secret
  labels:
    {{- include "springboot-k8s-demo.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_USER: {{ .Values.secret.DB_USER | quote }}
  DB_PASSWORD: {{ .Values.secret.DB_PASSWORD | quote }}
